<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A1</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #container {
            max-width: 100%;
            height: 100px;
            display: flex;
            gap: 25px;
        }
        .box {
           width: 100px;
           height:100px;
           background-color: rgb(128, 0, 128);
           border-radius: 10px;
           transition: all 0.3s ease;
        }
    
    </style>
</head>
<body>
    <div id="container">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
    <script>
        const boxes = document.querySelectorAll(".box");

        boxes.forEach((box, index) => {
            box.addEventListener("mouseenter", ()=> {
                box.style.transform = "scale(1.2)";
               
                if (boxes[index - 1]){
                    boxes[index -1].style.transform = "scale(1.1)";
                }
                if (boxes[index + 1]){
                    boxes[index + 1].style.transform = "scale(1.1)";
                }
            })
            box.addEventListener("mouseleave", ()=> {
                box.style.transform = "scale(1)";
                 if (boxes[index - 1]){
                    boxes[index -1].style.transform = "scale(1)";
                }
                if (boxes[index + 1]){
                    boxes[index + 1].style.transform = "scale(1)";
                }
                box.style.background = `rgb(128, 0, 128)`;
            })

            box.addEventListener("mousemove", (e) => {
                const rect = box.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                console.log(x, y);
                
                box.style.background = `radial-gradient(circle at ${x}px ${y}px, rgb(235, 124, 218, 0.2) 0%, rgb(128, 0, 128) 80%)`;
            })

        })
    </script>
</body>
</html>
