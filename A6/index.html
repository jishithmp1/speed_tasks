<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A6</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        #loader {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 10px solid;
            border-left-color: black;
            border-right-color: black;
            border-top-color: white;
            border-bottom-color: white;
            animation: spin 1s linear infinite;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes spin {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="loader"></div>
    <div class="container">
        <video src="https://download.blender.org/peach/bigbuckbunny_movies/BigBuckBunny_320x180.mp4" autoplay muted loop></video>
    </div>
    <script>
        window.addEventListener("load", ()=> {
            document.getElementById("loader").style.display = "none";
        })
    </script>
</body>

</html>
