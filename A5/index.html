<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A4</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 1fr;
        }
        .top {
            display: flex;
            gap: 30px;
        }
        .bottom {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-top: -100px;
        }
        .circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 10px solid transparent;
        }
        .blue {
            border-color: blue;
        }
        .red {
            border-color: red;
        }
        .yellow {
            border-color: yellow;
        }
        .black {
            border-color: black;
        }
        .green {
            border-color: green;
        }
        
    </style>
</head>

<body>
    <div class="container">
        <div class="top">
            <div class="circle blue"></div>
            <div class="circle black"></div>
            <div class="circle red"></div>
        </div>
        <div class="bottom">
            <div class="circle yellow"></div>
            <div class="circle green"></div>
        </div>
    </div>
</body>

</html>
