<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A4</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: black;
        }
        .container {
            display: flex;
            gap: 50px;
        }
        .ball {
            width: 60px;
            height: 60px;
            background-color: white;
            border-radius: 50%;
            animation: jump 3s ease infinite;
            animation-delay: var(--d);
            position: absolute;
        }
        .shadow {
            margin-top: 70px;
            width: 60px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0.2) 60%, rgba(255, 255, 255, 0) 90%);
            animation: shadow 3s ease infinite;
            animation-delay: var(--d);
            opacity: 0;
        }

        @keyframes shadow {
            0%, 100% {
                opacity: 0.6;
                transform: scaleX(1.1);
            }
            50% {
                opacity: 0.2;
                 transform: scaleX(1.1);
            }
        
        }

        @keyframes jump {
            0% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-100px);
            }
            100% {
                transform: translateY(0);
            }
        }
      
    </style>
</head>
<body>
    <div class="container">
     <div class="wrapper">
        <div class="ball" style="--d: 0s"></div>
        <div class="shadow" style="--d: 0s"></div>
     </div>
     <div class="wrapper">
        <div class="ball" style="--d: 1s"></div>
        <div class="shadow" style="--d: 1s"></div>
     </div>
      <div class="wrapper">
        <div class="ball" style="--d: 2s"></div>
        <div class="shadow" style="--d: 2s"></div>
      </div>
    </div>
</body>
</html>
